services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: furnace
      POSTGRES_USER: furnace
      POSTGRES_PASSWORD: furnace
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U furnace -d furnace"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - furnace-postgres-data:/var/lib/postgresql/data

volumes:
  furnace-postgres-data:
